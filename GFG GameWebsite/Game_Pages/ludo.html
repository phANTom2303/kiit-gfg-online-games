<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo Game</title>
    <!-- <link rel="stylesheet" href="../styles.css"> -->
    <link rel="stylesheet" href="game_page_style.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="../img/logo.png" alt="Logo">
            <a href="../index.html">
                <span>ONLINE GAME</span>
            </a>
            
        </div>
        <nav>
            <ul>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
                <li><a href="#">Feedback</a></li>
            </ul>
        </nav>
    </header>
    <main class="game-page">
        <div class="game-banner">
            <img src="../img/game_banner/ludo_banner.gif" alt="Ludo Game Banner">
        </div>
        <div class="game-details">
            <div class="game-info">
                <h2>LUDO</h2>
                <div class="detail">
                    <img src="../img/player.png" alt="Player Count">
                    <p>4 Player</p>
                </div>
                <div class="detail">
                    <img src="../img/clock.png" alt="Avg Time">
                    <p>~40 minutes</p>
                </div>
            </div>
            <div class="game-actions">
                <button>Create your lobby</button>
                <button>Play</button>
            </div>
        </div>
    </main>
    <script src="../scripts.js"></script>
</body>
</html>
