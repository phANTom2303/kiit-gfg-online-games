<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="/img/logo.png" alt="Logo">
            <a href="index.html">
                <span>ONLINE GAME</span>
            </a>
            
        </div>
        <nav>
            <ul>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
                <li><a href="#">Feedback</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="search">
            <div class="search-bar">
                <input type="text" placeholder="Search">
                <button>
                    <img src="/img/search.png" alt="Search">
                </button>
            </div>
            <div class="categories">
                <button>New</button>
                <button>Multiplayer</button>
                <button>Adventure</button>
                <button>10 Min Play</button>
                <button>20 Min Play</button>
                <button>4 Player</button>
            </div>
        </div>
        
        <div class="games-grid">
            <!--Game 1  Ludo -->
            <div class="game-card" data-url="Game_Pages/ludo.html">
                <img src="/img/game cards/game.png" alt="Game 1">
                <div class="game-info">
                    <h2>LUDO</h2>
                    <div class="details">
                        <div class="game-logo">
                            <img src="/img/player.png" alt="Player Count">
                        </div>
                        <p>4 Player</p>
                        <div class="game-logo">
                            <img src="/img/clock.png" alt="Avg Time">
                        </div>
                        <p>~30 mins</p>
                    </div>
                </div>
            </div>
            <!-- Game 2 Tik tac toe -->
            <div class="game-card">
                <img src="/img/game cards/tik_tac_toe.png" alt="Game 2">
                <div class="game-info">
                    <h2>TIK TAC TOE</h2>
                    <div class="details">
                        <div class="game-logo">
                            <img src="/img/player.png" alt="Player Count">
                        </div>
                        <p>2 Player</p>
                        <div class="game-logo">
                            <img src="/img/clock.png" alt="Avg Time">
                        </div>
                        <p>~1 mins</p>
                    </div>
                </div>
            </div>
            <!-- Game 3 Connect 4 -->
            <div class="game-card">
                <img src="/img/game cards/connect4.png" alt="Game 3">
                <div class="game-info">
                    <h2>Connect 4</h2>
                    <div class="details">
                        <div class="game-logo">
                            <img src="/img/player.png" alt="Player Count">
                        </div>
                        <p>2 Player</p>
                        <div class="game-logo">
                            <img src="/img/clock.png" alt="Avg Time">
                        </div>
                        <p>~10 mins</p>
                    </div>
                </div>
            </div>
            <!-- Game 4 snake and lader -->
            <div class="game-card">
                <img src="/img/game cards/snake_and_ladder.png" alt="Game 4">
                <div class="game-info">
                    <h2>Snakes And Ladders</h2>
                    <div class="details">
                        <div class="game-logo">
                            <img src="/img/player.png" alt="Player Count">
                        </div>
                        <p>4 Player</p>
                        <div class="game-logo">
                            <img src="/img/clock.png" alt="Avg Time">
                        </div>
                        <p>~15 mins</p>
                    </div>
                </div>
            </div>

            <!-- Game 5 battleship -->
            <div class="game-card">
                <img src="/img/game cards/battleship.png" alt="Game 5">
                <div class="game-info">
                    <h2>Battleship</h2>
                    <div class="details">
                        <div class="game-logo">
                            <img src="/img/player.png" alt="Player Count">
                        </div>
                        <p>2 Player</p>
                        <div class="game-logo">
                            <img src="/img/clock.png" alt="Avg Time">
                        </div>
                        <p>~30 mins</p>
                    </div>
                </div>
            </div>

            <!-- Game 6 ,uno-->
            <div class="game-card">
                <img src="/img/game cards/uno.png" alt="Game 6">
                <div class="game-info">
                    <h2>UNO</h2>
                    <div class="details">
                        <div class="game-logo">
                            <img src="/img/player.png" alt="Player Count">
                        </div>
                        <p>4 Player</p>
                        <div class="game-logo">
                            <img src="/img/clock.png" alt="Avg Time">
                        </div>
                        <p>~30 mins</p>
                    </div>
                </div>
            </div>
            <!-- Game 7 Card -->
            <div class="game-card">
                <img src="/img/game cards/card.png" alt="Game 7">
                <div class="game-info">
                    <h2>Card</h2>
                    <div class="details">
                        <div class="game-logo">
                            <img src="/img/player.png" alt="Player Count">
                        </div>
                        <p>4 Player</p>
                        <div class="game-logo">
                            <img src="/img/clock.png" alt="Avg Time">
                        </div>
                        <p>~30 mins</p>
                    </div>
                </div>
            </div>
            <!-- Game 8  Chess-->
            <div class="game-card" >
                <img src="/img/game cards/chess.png" alt="Game 8">
                <div class="game-info">
                    <h2>Chess</h2>
                    <div class="details">
                        <div class="game-logo">
                            <img src="/img/player.png" alt="Player Count">
                        </div>
                        <p>2 Player</p>
                        <div class="game-logo">
                            <img src="/img/clock.png" alt="Avg Time">
                        </div>
                        <p>~20 mins</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="scripts.js"></script>
</body>
</html>
